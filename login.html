<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Stonebridge Trust</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0A0A0F;
      --bg-secondary: #111118;
      --bg-card: #14141E;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0B0;
      --text-muted: #6B6B80;
      --accent-gold: #C6A43F;
      --accent-gold-dark: #a8882c;
      --border-light: rgba(255,255,255,0.06);
      --border-gold: rgba(198, 164, 63, 0.3);
    }

    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    nav {
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 3rem;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border-light);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .nav-logo img {
      height: 45px;
      width: auto;
    }
    .nav-links { 
      display: flex; 
      gap: 0.25rem; 
      list-style: none; 
      align-items: center; 
      flex-wrap: wrap;
    }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    .nav-links a:hover { 
      background: rgba(255,255,255,0.05);
      color: var(--accent-gold);
    }
    .btn-nav {
      background: var(--accent-gold);
      color: #0A0A0F;
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn-nav:hover { 
      background: var(--accent-gold-dark);
      color: #0A0A0F;
    }

    .form-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 150px);
      padding: 2rem;
    }
    .form-box {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 2.5rem;
      max-width: 450px;
      width: 100%;
      border: 1px solid var(--border-light);
    }
    .form-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .form-box p {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
    }
    .form-group input {
      width: 100%;
      padding: 0.85rem;
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      font-size: 0.9rem;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent-gold);
    }
    .submit-btn {
      width: 100%;
      background: var(--accent-gold);
      color: #0A0A0F;
      padding: 0.85rem;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 0.5rem;
    }
    .submit-btn:hover {
      background: var(--accent-gold-dark);
      transform: translateY(-2px);
    }
    .form-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
    }
    .form-link a {
      color: var(--accent-gold);
      text-decoration: none;
    }
    .form-link a:hover {
      text-decoration: underline;
    }
    footer {
      background: var(--bg-secondary);
      color: var(--text-muted);
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid var(--border-light);
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; flex-direction: column; text-align: center; }
      .nav-links { justify-content: center; }
      .form-box { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <img src="images/logo.png.jpg" alt="Stonebridge Trust">
    </a>
    <ul class="nav-links" id="navLinks"></ul>
  </nav>

  <div class="form-page">
    <div class="form-box">
      <h2>Welcome Back</h2>
      <p>Log in to access your Stonebridge Trust account.</p>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>
      <button class="submit-btn" onclick="handleLogin()">Log In</button>
      <p class="form-link">Don't have an account? 
        <a href="register.html">Register here</a>
      </p>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Stonebridge Trust. All rights reserved. | Member FDIC | Equal Housing Lender</p>
  </footer>

  <script>
    const loggedInUser = JSON.parse(localStorage.getItem('user'));
    const navLinks = document.getElementById('navLinks');

    if (loggedInUser) {
      navLinks.innerHTML = `
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="banking.html">Banking</a></li>
        <li><a href="housing.html">Housing</a></li>
        <li><a href="loans.html">Loans</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      `;
    } else {
      navLinks.innerHTML = `
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="banking.html">Banking</a></li>
        <li><a href="housing.html">Housing</a></li>
        <li><a href="loans.html">Loans</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="login.html" class="btn-nav">Login</a></li>
      `;
    }

    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        alert('Please enter your email and password.');
        return;
      }

      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (data.success) {
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } else {
        alert(data.message || 'Invalid email or password.');
      }
    }
  </script>

</body>
</html>
